<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shocurt icon" href="img/r.ico.ico" type="ico">
</head>

<body>
    <div class="container">
        <div class="seletora">

            <form class="login">
                <h1>Login</h1>
                <div class="input">
                    <label for="username">Email ou Telefone*</label>
                    <input type="text" id="username" placeholder="Digite seu usuário" required>
                </div>
                <div class="input">
                    <label for="password">Digite sua senha*</label>
                    <input type="password" id="password" placeholder="Digite sua senha" required>
                </div>
                <div class="opcao">
                    <div>
                        <input type="checkbox" id="lembrar" name="lembrar">
                        <label for="lembrar">Lembrar-me</label>
                    </div>
                    <p class="entra"><a href="#">Esqueceu a senha?</a></p>
                </div>
                <a href="inicio.html">
                    <button type="button">Entrar</button>
                </a>
                <p class="entra">Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
            </form>
        </div>
        <div class="img">
            <img src="img/logo-fundo preto.jpg" alt="">
        </div>
    </div>

</body>

</html>
